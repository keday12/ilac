<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İlaç Takibi</title>
<style>
  :root{
    --bg:#f3f1ec;--card:#fff;--ink:#242b2a;--muted:#6b7573;--line:#e4e1d8;
    --p1:#1f8a70;--p1-soft:#e3f2ec;--p2:#c9622e;--p2-soft:#f7e9df;
    --warn:#8a5a1f;--warn-soft:#f6ecd8;--ok:#1f8a70;--off:#9aa3a0;
    --shadow:0 1px 2px rgba(0,0,0,.04),0 4px 14px rgba(0,0,0,.05);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.45;padding:0 0 48px}
  .wrap{max-width:560px;margin:0 auto;padding:0 16px}
  header{padding:22px 0 10px}
  h1{font-size:1.35rem;margin:0 0 2px;letter-spacing:-.01em}
  .sub{color:var(--muted);font-size:.9rem}

  .status{display:inline-flex;align-items:center;gap:7px;font-size:.78rem;font-weight:600;
    padding:5px 11px;border-radius:999px;margin-top:10px}
  .status .dot{width:8px;height:8px;border-radius:50%}
  .status.on{background:var(--p1-soft);color:var(--ok)} .status.on .dot{background:var(--ok)}
  .status.local{background:#eceae3;color:var(--muted)} .status.local .dot{background:var(--off)}
  .status.offline{background:var(--warn-soft);color:var(--warn)} .status.offline .dot{background:var(--warn)}

  .names{display:flex;gap:10px;margin:14px 0 6px}
  .names .field{flex:1;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:8px 10px;box-shadow:var(--shadow)}
  .names label{display:block;font-size:.68rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:2px}
  .names .field.k1 label{color:var(--p1)} .names .field.k2 label{color:var(--p2)}
  .names input{border:none;outline:none;font-size:.95rem;width:100%;font-weight:600;color:var(--ink);background:transparent}

  .datenav{display:flex;align-items:center;justify-content:space-between;
    background:var(--card);border:1px solid var(--line);border-radius:14px;padding:8px;margin:12px 0 18px;box-shadow:var(--shadow)}
  .datenav button{border:none;background:#f0eee7;border-radius:10px;width:40px;height:40px;font-size:1.1rem;cursor:pointer;color:var(--ink)}
  .datenav button:active{transform:scale(.94)}
  .datenav .today{text-align:center}
  .datenav .today .d{font-weight:700;font-size:1rem}
  .datenav .today .w{font-size:.78rem;color:var(--muted)}
  .todaybtn{font-size:.72rem !important;width:auto !important;padding:0 12px;height:34px !important;background:var(--ink) !important;color:#fff !important;border-radius:9px}
  .istoday{color:var(--p1);font-weight:700}

  .med{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px 14px 6px;margin-bottom:14px;box-shadow:var(--shadow)}
  .med-name{font-size:1.12rem;font-weight:700;letter-spacing:-.01em}
  .med-summary{color:var(--muted);font-size:.85rem;margin-top:1px}
  .badges{margin:8px 0 2px;display:flex;flex-wrap:wrap;gap:6px}
  .badge{font-size:.72rem;padding:3px 9px;border-radius:999px;background:var(--warn-soft);color:var(--warn);font-weight:600}
  .badge.info{background:#e9eef2;color:#3a5568}

  .dose{border-top:1px solid var(--line);padding:12px 0}
  .dose:first-of-type{border-top:none}
  .dose-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
  .dose-label{font-weight:600}
  .dose-amt{font-size:.92rem;background:#f0eee7;padding:2px 9px;border-radius:8px;font-weight:600}
  .checks{display:flex;gap:9px}
  .check{flex:1;border:1.5px solid var(--line);background:#fff;border-radius:12px;padding:10px 8px;cursor:pointer;text-align:center;transition:.12s;min-height:56px;display:flex;flex-direction:column;justify-content:center}
  .check:active{transform:scale(.97)}
  .check .who{font-size:.82rem;font-weight:700;color:var(--muted)}
  .check .state{font-size:.72rem;color:var(--muted);margin-top:2px}
  .check.k1.on{background:var(--p1-soft);border-color:var(--p1)}
  .check.k1.on .who,.check.k1.on .state{color:var(--p1)}
  .check.k2.on{background:var(--p2-soft);border-color:var(--p2)}
  .check.k2.on .who,.check.k2.on .state{color:var(--p2)}

  .modebar{display:flex;gap:6px;margin:6px 0 2px;background:#f0eee7;border-radius:11px;padding:4px}
  .modebar button{flex:1;border:none;background:transparent;padding:7px 6px;border-radius:8px;font-size:.8rem;font-weight:600;color:var(--muted);cursor:pointer}
  .modebar button.act{background:#fff;color:var(--ink);box-shadow:var(--shadow)}

  .foot{color:var(--muted);font-size:.76rem;text-align:center;margin-top:22px;padding:0 10px;line-height:1.5}
  .reset{display:block;margin:16px auto 0;background:transparent;border:1px solid var(--line);color:var(--muted);border-radius:9px;padding:7px 14px;font-size:.78rem;cursor:pointer}
  #gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
  #gate .box{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:24px 22px;max-width:340px;width:100%;box-shadow:var(--shadow);text-align:center}
  #gate h2{margin:0 0 4px;font-size:1.2rem}
  #gate p{margin:0 0 16px;color:var(--muted);font-size:.88rem}
  #gate input{width:100%;padding:12px;border:1.5px solid var(--line);border-radius:11px;font-size:1rem;text-align:center;outline:none;margin-bottom:10px;background:#fff}
  #gate input:focus{border-color:var(--p1)}
  #gate button{width:100%;padding:12px;border:none;border-radius:11px;background:var(--p1);color:#fff;font-size:1rem;font-weight:700;cursor:pointer}
  #gate button:active{transform:scale(.98)}
  #gate .err{color:#c0392b;font-size:.82rem;margin-top:10px;min-height:1em}
  .locked{display:none !important}
</style>
</head>
<body>
<div id="gate">
  <div class="box">
    <h2>İlaç Takibi</h2>
    <p>Devam etmek için giriş kodunu gir.</p>
    <input id="gateInput" type="password" inputmode="text" placeholder="Giriş kodu" autocomplete="off">
    <button id="gateBtn">Giriş</button>
    <div class="err" id="gateErr"></div>
  </div>
</div>

<div class="wrap locked" id="app">
  <header>
    <h1>Ablamın İlaç Takibi</h1>
    <div class="sub">İkiniz ayrı ayrı işaretleyin — kim verdiyse o kutuya dokunsun.</div>
    <div id="status" class="status local"><span class="dot"></span><span id="statusText">Sadece bu cihaz</span></div>
    <div class="names">
      <div class="field k1"><label>Kişi 1</label><input id="name1" maxlength="14" placeholder="İsim"></div>
      <div class="field k2"><label>Kişi 2</label><input id="name2" maxlength="14" placeholder="İsim"></div>
    </div>
  </header>

  <div class="datenav">
    <button id="prev" aria-label="Önceki gün">‹</button>
    <div class="today"><div class="d" id="dayLabel"></div><div class="w" id="weekLabel"></div></div>
    <button id="next" aria-label="Sonraki gün">›</button>
    <button class="todaybtn" id="todayBtn">Bugün</button>
  </div>

  <div id="meds"></div>
  <button class="reset" id="clearDay">Bu günün işaretlerini temizle</button>

  <div class="foot">
    Bu sayfa yalnızca hatırlatma/takip amaçlıdır. Doz değişikliği veya emin olmadığınız bir durum için doktora danışın.
  </div>
</div>

<!-- Firebase (eşitleme için). Ayarlamadan da sayfa tek cihazda çalışır. -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
"use strict";

/* ============================================================
   1) EŞİTLEME AYARI  —  iki telefonun aynı veriyi görmesi için
   Firebase'den aldığın config'i buraya yapıştır. Yapıştırmazsan
   sayfa yine çalışır ama sadece bu cihazda saklanır (eşitleme yok).
   ============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyD3F1JEckZMTd4CclLYIL-k-mliBniXDa0",
  authDomain: "busra-ilac-takip.firebaseapp.com",
  databaseURL: "https://busra-ilac-takip-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "busra-ilac-takip",
  storageBucket: "busra-ilac-takip.firebasestorage.app",
  messagingSenderId: "383402555552",
  appId: "1:383402555552:web:f0f98a8638b7b8558d31c5"
};
// İki telefonda da AYNI dosyayı kullanın (aynı oda kodu). İsterseniz değiştirin:
const ROOM = "abla-ilac-7c3a";
// Giriş kodu — istediğinle değiştir (herkese söyleyeceğin ortak kod):
const ACCESS_CODE = "InekBusra31";
/* ============================================================ */

/* ---- sabit başlangıç tarihleri (her cihazda aynı olsun diye elle yazılı) ---- */
const PAXERA_START = "2026-07-02"; // 1. gün = bugün, bugün+yarın 10mg, sonraki 2 gün 5mg
const ARIPA_START  = "2026-07-02"; // 1. hafta ½, sonrası tam  (bugün başladı varsayıldı)

/* ---- tarih yardımcıları ---- */
const DAYS=["Pazar","Pazartesi","Salı","Çarşamba","Perşembe","Cuma","Cumartesi"];
const MONTHS=["Oca","Şub","Mar","Nis","May","Haz","Tem","Ağu","Eyl","Eki","Kas","Ara"];
function ymd(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function parseYmd(s){const[a,b,c]=s.split("-").map(Number);return new Date(a,b-1,c);}
function daysBetween(a,b){return Math.round((parseYmd(a)-parseYmd(b))/86400000);}
function hhmm(){const n=new Date();return String(n.getHours()).padStart(2,"0")+":"+String(n.getMinutes()).padStart(2,"0");}
function escapeHtml(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

/* ---- yerel depolama (yedek / tek-cihaz modu) ---- */
function load(k,def){try{const v=localStorage.getItem(k);return v===null?def:JSON.parse(v);}catch(e){return def;}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

/* ---- durum ---- */
let viewDate=ymd(new Date());
let records=load("records",{});
let ativanMode=load("ativanMode","normal");
let names=load("names",{p1:"Kişi 1",p2:"Kişi 2"});

/* ---- Firebase başlat ---- */
let MODE="local", roomRef=null;
const FB_ON = firebaseConfig.apiKey && firebaseConfig.apiKey.indexOf("PASTE")===-1;
if(FB_ON){
  try{
    firebase.initializeApp(firebaseConfig);
    const db=firebase.database();
    roomRef=db.ref("rooms/"+ROOM);
    MODE="fb";
    roomRef.on("value",snap=>{
      const v=snap.val()||{};
      records=v.records||{};
      ativanMode=v.ativanMode||"normal";
      names=v.names||{p1:"Kişi 1",p2:"Kişi 2"};
      render();
    });
    db.ref(".info/connected").on("value",s=>setStatus(s.val()?"on":"offline"));
    setStatus("on");
  }catch(e){ MODE="local"; setStatus("local"); }
}else{ setStatus("local"); }

function setStatus(kind){
  const el=document.getElementById("status"), t=document.getElementById("statusText");
  el.className="status "+(kind==="on"?"on":kind==="offline"?"offline":"local");
  t.textContent = kind==="on"?"İki telefon eşitleniyor":kind==="offline"?"Çevrimdışı — bağlanınca eşitlenecek":"Sadece bu cihaz";
}

/* ---- doz programı ---- */
function paxeraAmount(date){
  const diff=daysBetween(date,PAXERA_START);
  if(diff<0)return{amt:"—",note:"Henüz başlamadı"};
  if(diff<=1)return{amt:"10 mg",note:""};
  if(diff<=3)return{amt:"5 mg",note:""};
  return{amt:"5 mg",note:"Program bitti — doktora danışın"};
}
function aripaAmount(date){
  const diff=daysBetween(date,ARIPA_START);
  if(diff<0)return{amt:"—",note:"Henüz başlamadı"};
  if(diff<=6)return{amt:"½ tablet",note:"1. hafta"};
  return{amt:"1 tablet",note:""};
}
function buildMeds(date){
  const pax=paxeraAmount(date), ari=aripaAmount(date);
  const ativanDoses = ativanMode==="reduced"
    ? [{id:"sabah",label:"Sabah",amt:"½ tablet"},{id:"aksam",label:"Akşam",amt:"½ tablet"}]
    : [{id:"sabah",label:"Sabah",amt:"1 tablet"},{id:"ogle",label:"Öğle",amt:"1 tablet"},{id:"aksam",label:"Akşam",amt:"1 tablet"}];
  return [
    {id:"concor",name:"Concor",summary:"Günde 1",badges:[],doses:[{id:"d1",label:"Günde 1",amt:"½ tablet"}]},
    {id:"paxera",name:"Paxera",summary:"Günde 1 • doz gün gün değişir",badges:pax.note?[{t:pax.note,info:true}]:[],doses:[{id:"d1",label:"Günde 1",amt:pax.amt}]},
    {id:"gyrex",name:"Gyrex",summary:"Günde 1 • akşam",badges:[{t:"Aç karına"}],doses:[{id:"d1",label:"Akşam",amt:"1 tablet"}]},
    {id:"ativan",name:"Ativan",summary:ativanMode==="reduced"?"Sabah • Akşam (azaltılmış)":"Sabah • Öğle • Akşam",badges:[{t:"Ağızda eritilmeli"}],ativan:true,doses:ativanDoses},
    {id:"aripa",name:"Aripa",summary:"Günde 1 • akşam",badges:ari.note?[{t:ari.note,info:true}]:[],doses:[{id:"d1",label:"Akşam",amt:ari.amt}]},
    {id:"lithuril",name:"Lithuril",summary:"Sabah • Akşam",badges:[{t:"Tok karına"}],doses:[{id:"sabah",label:"Sabah",amt:"1 tablet"},{id:"aksam",label:"Akşam",amt:"1 tablet"}]},
  ];
}

/* ---- kayıt erişimi ---- */
function key(m,d){return m+"_"+d;}
function getRec(date,m,d){const day=records[date]||{};return day[key(m,d)]||{p1:false,p1t:null,p2:false,p2t:null};}
function toggle(date,m,d,who){
  const k=key(m,d);
  if(!records[date])records[date]={};
  const r=records[date][k]||{p1:false,p1t:null,p2:false,p2t:null};
  const stamp=hhmm();
  if(who===1){r.p1=!r.p1;r.p1t=r.p1?stamp:null;} else {r.p2=!r.p2;r.p2t=r.p2?stamp:null;}
  records[date][k]=r;
  render();
  if(MODE==="fb"){roomRef.child("records/"+date+"/"+k).set(r);} else {save("records",records);}
}

/* ---- çizim ---- */
function render(){
  const d=parseYmd(viewDate), isToday=viewDate===ymd(new Date());
  document.getElementById("dayLabel").textContent=d.getDate()+" "+MONTHS[d.getMonth()]+" "+d.getFullYear();
  const wl=document.getElementById("weekLabel");
  wl.textContent=DAYS[d.getDay()]+(isToday?" • Bugün":""); wl.className="w"+(isToday?" istoday":"");

  const n1=document.getElementById("name1"), n2=document.getElementById("name2");
  if(document.activeElement!==n1)n1.value=names.p1;
  if(document.activeElement!==n2)n2.value=names.p2;

  const cont=document.getElementById("meds"); cont.innerHTML="";
  buildMeds(viewDate).forEach(med=>{
    const card=document.createElement("div"); card.className="med";
    let h=`<div class="med-name">${med.name}</div><div class="med-summary">${med.summary}</div>`;
    if(med.badges.length)h+=`<div class="badges">`+med.badges.map(b=>`<span class="badge${b.info?" info":""}">${b.t}</span>`).join("")+`</div>`;
    if(med.ativan)h+=`<div class="modebar">
        <button data-mode="normal" class="${ativanMode==='normal'?'act':''}">Normal (3 doz)</button>
        <button data-mode="reduced" class="${ativanMode==='reduced'?'act':''}">Azaltılmış (S-A ½)</button></div>`;
    med.doses.forEach(dose=>{
      const r=getRec(viewDate,med.id,dose.id);
      const s1=r.p1?`✓ ${r.p1t}`:"verdim", s2=r.p2?`✓ ${r.p2t}`:"verdim";
      h+=`<div class="dose"><div class="dose-head"><span class="dose-label">${dose.label}</span><span class="dose-amt">${dose.amt}</span></div>
        <div class="checks">
          <div class="check k1 ${r.p1?'on':''}" data-med="${med.id}" data-dose="${dose.id}" data-who="1"><div class="who">${escapeHtml(names.p1)}</div><div class="state">${s1}</div></div>
          <div class="check k2 ${r.p2?'on':''}" data-med="${med.id}" data-dose="${dose.id}" data-who="2"><div class="who">${escapeHtml(names.p2)}</div><div class="state">${s2}</div></div>
        </div></div>`;
    });
    card.innerHTML=h; cont.appendChild(card);
  });
  cont.querySelectorAll(".check").forEach(el=>el.addEventListener("click",()=>toggle(viewDate,el.dataset.med,el.dataset.dose,Number(el.dataset.who))));
  cont.querySelectorAll(".modebar button").forEach(b=>b.addEventListener("click",()=>{
    ativanMode=b.dataset.mode; render();
    if(MODE==="fb"){roomRef.child("ativanMode").set(ativanMode);} else {save("ativanMode",ativanMode);}
  }));
}

/* ---- gezinme & isim ---- */
function shiftDay(n){const d=parseYmd(viewDate);d.setDate(d.getDate()+n);viewDate=ymd(d);render();}
document.getElementById("prev").addEventListener("click",()=>shiftDay(-1));
document.getElementById("next").addEventListener("click",()=>shiftDay(1));
document.getElementById("todayBtn").addEventListener("click",()=>{viewDate=ymd(new Date());render();});
document.getElementById("clearDay").addEventListener("click",()=>{
  if(confirm("Bu günün tüm işaretleri silinsin mi?")){
    delete records[viewDate];
    if(MODE==="fb"){roomRef.child("records/"+viewDate).remove();} else {save("records",records);}
    render();
  }
});
function saveNames(){ if(MODE==="fb"){roomRef.child("names").set(names);} else {save("names",names);} }
document.getElementById("name1").addEventListener("input",e=>{names.p1=e.target.value||"Kişi 1";document.querySelectorAll(".check.k1 .who").forEach(w=>w.textContent=names.p1);saveNames();});
document.getElementById("name2").addEventListener("input",e=>{names.p2=e.target.value||"Kişi 2";document.querySelectorAll(".check.k2 .who").forEach(w=>w.textContent=names.p2);saveNames();});

render();

/* ---- giriş kilidi ---- */
(function(){
  const gate=document.getElementById("gate");
  const app=document.getElementById("app");
  const inp=document.getElementById("gateInput");
  const err=document.getElementById("gateErr");
  function unlock(){ gate.style.display="none"; app.classList.remove("locked"); }
  if(localStorage.getItem("access_ok")==="1"){ unlock(); }
  else { setTimeout(()=>inp.focus(),100); }
  function tryUnlock(){
    if(inp.value===ACCESS_CODE){ localStorage.setItem("access_ok","1"); err.textContent=""; unlock(); }
    else { err.textContent="Kod yanlış."; inp.value=""; inp.focus(); }
  }
  document.getElementById("gateBtn").addEventListener("click",tryUnlock);
  inp.addEventListener("keydown",e=>{ if(e.key==="Enter")tryUnlock(); });
})();
</script>
</body>
</html>
